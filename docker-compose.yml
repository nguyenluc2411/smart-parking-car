# Smart Parking System — full stack (Phase 1: Docker Compose).
# Usage:
#   cp .env.example .env   # then fill in the change_me_* values
#   docker compose up -d --build
# Startup is ordered via healthchecks (DBs + Kafka -> services -> monitoring).
#
# NOTE: the Next.js admin-dashboard (:3000) is not part of this repo yet, so it is omitted.
#       alertmanager is optional and omitted (see docs). node-exporter / kafka-exporter are wired.

name: smart-parking-car

services:
  # ---------------------------------------------------------------- databases
  admin-db:
    image: postgres:16-alpine
    container_name: admin-db
    environment:
      POSTGRES_DB: ${ADMIN_DB_NAME}
      POSTGRES_USER: ${ADMIN_DB_USER}
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - admin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DB_USER} -d ${ADMIN_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [parking-net]

  parking-db:
    image: postgres:16-alpine
    container_name: parking-db
    environment:
      POSTGRES_DB: ${PARKING_DB_NAME}
      POSTGRES_USER: ${PARKING_DB_USER}
      POSTGRES_PASSWORD: ${PARKING_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - parking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PARKING_DB_USER} -d ${PARKING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [parking-net]

  billing-db:
    image: postgres:16-alpine
    container_name: billing-db
    environment:
      POSTGRES_DB: ${BILLING_DB_NAME}
      POSTGRES_USER: ${BILLING_DB_USER}
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER} -d ${BILLING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [parking-net]

  # -------------------------------------------------------------------- kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      # KRaft cluster id must be a 22-char url-safe base64 UUID (not the human-readable .env value).
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [parking-net]

  # Kafka UI — dev/ops tool để duyệt topic/message/consumer-group qua web (không phải service nghiệp vụ).
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smart-parking
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka: {condition: service_healthy}
    networks: [parking-net]

  # ------------------------------------------------------------------- minio
  # Object storage (S3-compatible) cho ảnh chụp xe vào/ra — phục vụ truy vết của operator/tài xế.
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [parking-net]

  # One-shot: tạo bucket (idempotent) rồi thoát. Bucket private — ảnh chỉ truy cập qua presigned URL.
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      echo 'bucket ${MINIO_BUCKET} ready';
      "
    networks: [parking-net]

  # ----------------------------------------------------------------- services
  admin-service:
    build: ./backend/admin-service
    image: smart-parking/admin:${VERSION}
    container_name: admin-service
    env_file: [.env]
    environment:
      JAVA_OPTS: ${ADMIN_JAVA_OPTS:-}
    ports:
      - "${ADMIN_SERVICE_PORT:-8083}:8083"
    depends_on:
      admin-db: {condition: service_healthy}
      kafka: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [parking-net]

  parking-service:
    build: ./backend/parking-service
    image: smart-parking/parking:${VERSION}
    container_name: parking-service
    env_file: [.env]
    environment:
      JAVA_OPTS: ${PARKING_JAVA_OPTS:-}
    ports:
      - "${PARKING_SERVICE_PORT:-8081}:8081"
    depends_on:
      parking-db: {condition: service_healthy}
      kafka: {condition: service_healthy}
      minio: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [parking-net]

  billing-service:
    build: ./backend/billing-service
    image: smart-parking/billing:${VERSION}
    container_name: billing-service
    env_file: [.env]
    environment:
      JAVA_OPTS: ${BILLING_JAVA_OPTS:-}
    ports:
      - "${BILLING_SERVICE_PORT:-8082}:8082"
    depends_on:
      billing-db: {condition: service_healthy}
      kafka: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [parking-net]

  edge-agent:
    build: ./backend/edge-agent
    image: smart-parking/edge:${VERSION}
    container_name: edge-agent
    env_file: [.env]
    volumes:
      - ./backend/edge-agent/models:/app/models:ro
    environment:
      ALPR_MODE: "real"
      ALPR_DETECTOR: "yolo"                         # yolo = cắt vùng biển (top-K box) rồi OCR — nhanh (~0.5s) + chính xác hơn,
                                                    #   tự fallback ocr_only khi YOLO không ra biển. (đo: 83% vs 67%, p95 0.56s vs 11s)
      ALPR_MODEL_PATH: "/app/models/yolov8s_vn_v2.pt"  # plate detector cho đường yolo (best.pt mới — revert về yolov8s_vn.pt nếu kém hơn)
      ALPR_OCR_ENGINE: "paddle"                     # PIN engine rõ ràng (đừng để ngầm định). paddle = nhận diện chính
                                                    #   (đo: paddle 81% vs easyocr 22% trên tập VN). Image build sẵn libgomp1
                                                    #   + model paddle (Dockerfile), warmup lúc boot — /health alprReady báo trạng thái.
      ALPR_OCR_LANGUAGES: "en"
      ALPR_OCR_GPU: "false"                         # "true" nếu container có CUDA
      ALPR_PREPROCESS: "false"                      # upscale crop nhỏ + CLAHE + denoise trước OCR (blanket).
                                                    #   TẮT: hạ confidence trên ảnh rõ (đo được). Thay bằng MULTI_CANDIDATE.
      ALPR_MULTI_CANDIDATE: "true"                  # OCR raw trước; nếu yếu/không hợp lệ thì OCR thêm bản enhanced rồi
                                                    #   chọn bản tốt → CỨU biển nhỏ/mờ/đêm mà KHÔNG regression ảnh rõ
                                                    #   (đo: clean 22/27 không đổi, degraded +1). Latency chỉ tăng ở khung khó.
      ALPR_GRAMMAR_FIX: "true"                      # đọc lại vùng tỉnh (2 số đầu) chỉ-chữ-số, sửa 3->B->8
      CONFIDENCE_THRESHOLD: "0.4"                   # đường yolo báo OCR-confidence (thật, ~0.42–0.98); 0.4 nhận hết biển đọc đúng,
                                                    #   misread đa số tự rớt do canonicalize không hợp lệ. (BR-001-2 gốc 0.85)
    ports:
      - "${EDGE_AGENT_PORT:-8000}:8000"
    depends_on:
      kafka: {condition: service_healthy}
      minio: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s   # ALPR warmup nạp torch+paddle+YOLO lúc boot (cold start chậm); /health chỉ UP sau khi paddle sẵn sàng
    networks: [parking-net]

  # --------------------------------------------------------------- monitoring
  # Host CPU/RAM/disk/network metrics. On Docker Desktop the "host" is the Linux VM,
  # not Windows — metrics reflect the VM, which is still useful for the stack's own load.
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    networks: [parking-net]

  # Kafka broker/topic/consumer-group lag metrics (kafka_consumergroup_lag, ...).
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    depends_on:
      kafka: {condition: service_healthy}
    networks: [parking-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - parking-service
      - billing-service
      - admin-service
      - edge-agent
      - node-exporter
      - kafka-exporter
    networks: [parking-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GRAFANA_WEBHOOK_URL: ${GRAFANA_WEBHOOK_URL:-https://example.com/webhook}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks: [parking-net]

volumes:
  admin-db-data:
  parking-db-data:
  billing-db-data:
  kafka-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  parking-net:
    driver: bridge
