apiVersion: 1
contactPoints:
  - orgId: 1
    name: "Default Webhook"
    receivers:
      - uid: webhook_1
        type: webhook
        settings:
          url: "$GRAFANA_WEBHOOK_URL"

policies:
  - orgId: 1
    receiver: "Default Webhook"
    group_by: ['alertname', 'severity']
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
