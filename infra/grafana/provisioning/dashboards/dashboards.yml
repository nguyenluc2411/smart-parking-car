apiVersion: 1

# Tự nạp các dashboard JSON trong thư mục json/ (mount sẵn qua provisioning). Sửa file JSON ->
# Grafana reload sau ~10s, không cần import tay.
providers:
  - name: "Smart Parking"
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
